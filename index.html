<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CT-AI v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f3fbfb;
            --card-bg:#ffffff;
            --muted:#6b7785;
            --accent-1:#28c1b5; /* teal */
            --accent-2:#21a99a;
            --focus: rgba(33,169,154,0.15);
            --radius:12px;
            --shadow: 0 6px 20px rgba(18,38,63,0.08);
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg, #f6fffe 0%, var(--bg) 100%);
            color:#102a43;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:32px;
        }
        /* subtle decorative waves */
        .bg-waves{
            position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
        }
        .bg-waves svg{position:absolute; right:-10%; top:-8%; width:80%; opacity:0.08}

        .card{
            width:100%; max-width:420px; background:var(--card-bg);
            border-radius:16px; padding:32px; box-shadow:var(--shadow); position:relative; z-index:1;
        }
        .brand{ text-align:center; margin-bottom:18px }
        .brand h1{ margin:0; font-size:20px; font-weight:700 }
        .brand p{ margin:6px 0 0; color:var(--muted); font-size:13px }

        form{ display:block }
        .field{ margin-top:18px }
        label{ display:block; font-size:13px; margin-bottom:8px; font-weight:600 }

        .input-group{ position:relative }
        .input-group .icon{
            position:absolute; left:12px; top:50%; transform:translateY(-50%); width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:var(--accent-2);
        }
        .input-group input{
            width:100%; padding:14px 14px 14px 44px; border-radius:10px; border:1px solid #e6eef0; background:#fbffff; color:#0b2530; font-size:14px; outline:none; transition:box-shadow .18s, border-color .18s;
        }
        .input-group input:focus{ box-shadow: 0 8px 20px var(--focus); border-color:var(--accent-2); }
        .input-group .eye-btn{ position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; padding:6px; cursor:pointer; display:flex; align-items:center; color:var(--muted) }

        .actions{ display:flex; align-items:center; justify-content:space-between; margin-top:14px }
        .remember{ display:flex; align-items:center; gap:8px; color:var(--muted); font-size:14px }
        .remember input{ width:16px; height:16px }
        .forgot{ color:var(--accent-2); font-weight:600; font-size:14px; text-decoration:none }

        .btn-primary{ width:100%; margin-top:18px; padding:12px 16px; font-weight:700; border-radius:10px; border:none; cursor:pointer; color:white; background:linear-gradient(90deg,var(--accent-1),var(--accent-2)); box-shadow:0 6px 18px rgba(33,169,154,0.18); font-size:15px }

        .helper{ margin-top:14px; font-size:13px; color:var(--muted); text-align:center }

        /* error message */
        .error-msg{ color:#e44b4b; font-size:13px; min-height:18px; margin-top:8px }

        /* Responsive */
        @media (max-width:480px){ body{ padding:18px } .card{ padding:20px } }
    </style>
</head>
<body>
    <div class="bg-waves" aria-hidden="true">
        <!-- Decorative SVG waves -->
        <svg viewBox="0 0 800 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#28c1b5" stop-opacity="0.12"/><stop offset="1" stop-color="#21a99a" stop-opacity="0.06"/></linearGradient></defs>
            <path d="M0 200 C150 100 350 300 800 150 L800 0 L0 0 Z" fill="url(#g1)"></path>
        </svg>
    </div>

    <main class="card" role="main" aria-labelledby="login-title">
        <div class="brand">
            <h1 id="login-title">Đăng nhập</h1>
            <p>Đăng nhập để truy cập CT-AI v2.0</p>
        </div>

        <form class="login-form" onsubmit="event.preventDefault(); handleLogin();">
            <div class="field">
                <label for="username">Email</label>
                <div class="input-group">
                    <span class="icon" aria-hidden="true">
                        <!-- mail icon -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 6.5C3 5.67 3.67 5 4.5 5H19.5C20.33 5 21 5.67 21 6.5V17.5C21 18.33 20.33 19 19.5 19H4.5C3.67 19 3 18.33 3 17.5V6.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 6.5L12 12.5L3 6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                    <input type="email" id="username" name="username" placeholder="Nhập email tại đây" autocomplete="username" required>
                </div>
            </div>

            <div class="field">
                <label for="password">Mật khẩu</label>
                <div class="input-group">
                    <span class="icon" aria-hidden="true">
                        <!-- lock icon -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="11" width="17" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu tại đây" autocomplete="current-password" required>
                    <button type="button" class="eye-btn" aria-label="Hiện/ẩn mật khẩu" onclick="togglePassword()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.2"/></svg>
                    </button>
                </div>
            </div>

            <p id="login-error" class="error-msg" aria-live="polite"></p>

            <div class="actions">
                <label class="remember"><input type="checkbox" id="remember"> Ghi nhớ mật khẩu</label>
                <a href="#" class="forgot">Quên mật khẩu</a>
            </div>

            <button class="btn-primary" onclick="handleLogin()" type="button">ĐĂNG NHẬP</button>

            <p class="helper">Học viên vui lòng liên hệ <strong>Admin</strong> để được cấp tài khoản.</p>
        </form>
    </main>

<script>
    function togglePassword(){
        const pw = document.getElementById('password');
        if(!pw) return;
        pw.type = pw.type === 'password' ? 'text' : 'password';
    }
    function handleLogin(){
        // simple validation UI (keeps existing external script.js behavior if present)
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const err = document.getElementById('login-error');
        err.textContent = '';
        if(!user){ err.textContent = 'Vui lòng nhập email hoặc username.'; return; }
        if(!pass){ err.textContent = 'Vui lòng nhập mật khẩu.'; return; }
        // call existing script.js function if defined
        if(typeof window.handleLogin === 'function' && window.handleLogin !== handleLogin){
            // delegate to external handler
            window.handleLogin();
            return;
        }
        // fallback: show a loading state then success (replace with real auth)
        const btn = document.querySelector('.btn-primary');
        const prev = btn.textContent;
        btn.textContent = 'Đang đăng nhập...'; btn.disabled = true;
        setTimeout(()=>{ btn.textContent = prev; btn.disabled = false; err.textContent = ''; alert('Đã thực hiện giả lập đăng nhập. Thay bằng logic thật ở script.js'); }, 900);
    }
</script>
</body>
</html>
