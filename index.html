<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CT-AI v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* Layout chia đôi màn hình cho Desktop */
        .split-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* Phần giới thiệu / Branding (Bên trái) */
        .left-panel {
            flex: 1; /* Chiếm toàn bộ không gian còn lại */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Tone màu Công nghệ / AI */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #ffffff;
            text-align: center;
        }

        .left-panel h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .left-panel p {
            font-size: 1.2rem;
            color: #a0aec0;
            max-width: 80%;
            line-height: 1.6;
        }

        /* Khu vực Form đăng nhập (Bên phải) */
        .right-panel {
            width: 100%;
            max-width: 550px; /* Cố định chiều rộng form trên máy tính */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background-color: #ffffff;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto; /* Căn giữa form trong panel bên phải */
        }

        .logo-title {
            color: #102a43;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            color: #334e68;
            border: 1px solid #bcccdc;
            border-radius: 8px;
            outline: none;
            background-color: #f8fbfa;
            transition: all 0.3s ease;
        }

        .login-form input:focus {
            border-color: #2c5364;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(44, 83, 100, 0.15);
        }

        .login-form input::placeholder {
            color: #9fb3c8;
        }

        .login-btn {
            background-color: #2c3e50;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #1a252f;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #d64545;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            margin-top: -8px;
        }

        .note {
            margin-top: 32px;
            font-size: 14px;
            color: #627d98;
            line-height: 1.5;
        }
        
        .note strong {
            color: #2c3e50;
        }

        /* Responsive: Tối ưu cho Điện thoại và Tablet */
        @media (max-width: 900px) {
            .left-panel {
                display: none; /* Ẩn panel đồ họa trên màn hình nhỏ */
            }
            .right-panel {
                max-width: 100%; /* Form lấp đầy 100% chiều rộng điện thoại */
                padding: 40px 24px;
            }
            .login-wrapper {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="split-layout">
        <div class="left-panel">
            <h1>CT-AI v2.0</h1>
            <p>Nền tảng trí tuệ nhân tạo toàn diện. Đăng nhập để tiếp tục truy cập vào hệ thống làm việc của bạn.</p>
        </div>

        <div class="right-panel">
            <div class="login-wrapper">
                <h2 class="logo-title">Đăng nhập</h2>
                
                <div class="login-form">
                    <input type="text" id="username" placeholder="Email hoặc Username" required autocomplete="username">
                    <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
                    
                    <p id="login-error" class="error-msg"></p>
                    
                    <button onclick="handleLogin()" class="login-btn">Đăng nhập</button>
                </div>
                
                <p class="note">Lưu ý: Học viên vui lòng liên hệ <strong>Admin</strong> để được cấp tài khoản.</p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            errorMsg.style.color = "#d64545"; 

            if (!usernameInput || !passwordInput) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu!";
            } else {
                errorMsg.style.color = "#218c74";
                errorMsg.textContent = "Đang xác thực thông tin...";
                
                setTimeout(() => {
                    console.log("Submit:", usernameInput, passwordInput);
                }, 1000);
            }
        }
    </script>
</body>
</html>
