<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CT-AI v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Thiết lập mặc định cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Giao diện nền toàn màn hình sử dụng Flexbox để căn giữa */
        body.login-body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Hộp đăng nhập (Login Card) */
        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px; /* Giới hạn chiều rộng trên màn hình lớn, full màn trên điện thoại */
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Hiệu ứng nổi lên khi di chuột vào form (chỉ rõ trên máy tính) */
        .login-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        /* Tiêu đề */
        .logo-title {
            color: #102a43;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        /* Bố cục các trường nhập liệu */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-form input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            color: #334e68;
            border: 1px solid #bcccdc;
            border-radius: 8px;
            outline: none;
            background-color: #f8fbfa;
            transition: all 0.3s ease;
        }

        /* Hiệu ứng khi click vào ô nhập liệu */
        .login-form input:focus {
            border-color: #2684ff;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(38, 132, 255, 0.15);
        }

        .login-form input::placeholder {
            color: #9fb3c8;
        }

        /* Nút Đăng nhập */
        .login-btn {
            background-color: #2c3e50; /* Giữ màu chủ đạo của bạn */
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #1a252f;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Khu vực hiển thị lỗi */
        .error-msg {
            color: #d64545;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px; /* Giữ khoảng trống để layout không bị giật khi hiện lỗi */
            text-align: center;
            margin-top: -8px;
            margin-bottom: 4px;
        }

        /* Ghi chú chân trang */
        .note {
            margin-top: 24px;
            font-size: 14px;
            color: #627d98;
            text-align: center;
            line-height: 1.5;
        }
        
        .note strong {
            color: #2c3e50;
        }

        /* Tối ưu thêm cho màn hình điện thoại rất nhỏ (iPhone SE, Galaxy Fold...) */
        @media (max-width: 380px) {
            .login-container {
                padding: 30px 20px;
            }
            .logo-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <h2 class="logo-title">ĐĂNG NHẬP CT-AI</h2>
        <div class="login-form">
            <input type="text" id="username" placeholder="Email hoặc Username" required autocomplete="username">
            <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
            
            <p id="login-error" class="error-msg"></p>
            
            <button onclick="handleLogin()" class="login-btn">Đăng nhập</button>
        </div>
        <p class="note">Lưu ý: Học viên vui lòng liên hệ <strong>Admin</strong> để được cấp tài khoản.</p>
    </div>

    <script>
        // Hàm mô phỏng bắt lỗi form cơ bản để bạn test giao diện
        function handleLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            // Xóa style lỗi cũ (nếu có)
            errorMsg.style.color = "#d64545"; 

            if (!usernameInput || !passwordInput) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu!";
            } else {
                errorMsg.style.color = "#218c74"; // Đổi màu xanh lá khi thành công
                errorMsg.textContent = "Đang xác thực thông tin...";
                
                // Sau này bạn có thể thay khối code này bằng thao tác gọi API thực tế (Fetch/Axios)
                setTimeout(() => {
                    console.log("Submit:", usernameInput, passwordInput);
                }, 1000);
            }
        }
    </script>
</body>
</html>
