<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hệ thống luyện thi CT-AI - Góc học tập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root{--primary:#22b3a4;--bg-main:#f4f6f8;--bg-card:#fff;--text-dark:#1f2937;--text-gray:#6b7280;--border-color:#e5e7eb;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
        body{background:var(--bg-main);color:var(--text-dark);display:flex;height:100vh;overflow:hidden}
        .layout-wrapper{display:flex;width:100%;height:100%}
        .sidebar{background:var(--bg-card);width:300px;display:flex;flex-direction:column;border-right:1px solid var(--border-color)}
        .brand{padding:18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-color)}
        .brand-logo{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--primary)}
        .sidebar-menu{flex-grow:1;overflow-y:auto;padding:16px}
        .menu-group-title{font-size:.9rem;font-weight:600;margin:8px 0 8px 6px;color:var(--text-dark)}
        .menu-btn{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;padding:12px 14px;margin-bottom:8px;border-radius:8px;color:var(--text-dark);font-size:.95rem;cursor:pointer;transition:all .2s}
        .menu-btn i{font-size:1.1rem;color:var(--text-gray)}
        .menu-btn:hover{background:rgba(34,179,164,0.06)}
        .menu-btn.active{background:var(--primary);color:#fff}
        .menu-btn.active i{color:#fff}
        .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .top-header{background:var(--bg-card);padding:12px 18px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
        .content-scroll-area{flex-grow:1;padding:20px;overflow-y:auto}
        .breadcrumb{font-size:.95rem;color:var(--text-gray);margin-bottom:12px}
        .section-title{font-size:1.15rem;font-weight:600;margin-bottom:12px}
        .small{font-size:.9rem;color:var(--text-gray)}
        .flashcard{width:360px;height:220px;border-radius:12px;position:relative;transform-style:preserve-3d;transition:transform .6s;box-shadow:0 6px 18px rgba(0,0,0,.08);cursor:pointer;background:linear-gradient(135deg,#fff 0%,#f9fafb 100%)}
        .flashcard .side{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;padding:18px}
        .flashcard .back{transform:rotateY(180deg)}
        .flashcard.flipped{transform:rotateY(180deg)}
        .btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer;transition:all .2s}
        .btn:hover{background:rgba(34,179,164,0.1)}
        .btn.primary{background:var(--primary);color:#fff;border:0}
        .btn.primary:hover{background:#1a9885}
        .question{background:var(--bg-card);padding:12px;border-radius:8px;border:1px solid var(--border-color);margin-bottom:12px}
        .options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .option{padding:10px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer}
        .option.correct{background:#dcfce3;border-color:#86efac}
        .option.incorrect{background:#fee2e2;border-color:#fca5a5}
        .explain{margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid var(--border-color);display:none}
        /* Chapter and Material Styles */
        .chapter-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:16px;margin-top:16px}
        .chapter-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:16px;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .chapter-card:hover{box-shadow:0 6px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
        .chapter-card.active{border-color:var(--primary);background:rgba(34,179,164,0.05)}
        .chapter-card h3{color:var(--primary);margin-bottom:8px;font-size:1rem}
        .chapter-card p{color:var(--text-gray);font-size:.9rem;margin-bottom:10px}
        .material-item{background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
        .material-item:hover{background:rgba(34,179,164,0.05);border-color:var(--primary)}
        .material-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(34,179,164,0.1);font-size:1.2rem}
        .material-info{flex:1}
        .material-info strong{display:block;color:var(--text-dark);margin-bottom:4px}
        .material-info span{font-size:.85rem;color:var(--text-gray)}
        /* Modal Styles */
        @media(max-width:900px){.sidebar{display:none}}
        #viewerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;align-items:center;justify-content:center;padding:18px}
        #viewerModal .panel{width:100%;max-width:1200px;background:#fff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh}
        #viewerHeader{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee}
        #viewerBody{flex:1;padding:12px;overflow:auto;background:#f9fafb}
        .viewer-video{width:100%;max-height:600px}
        .viewer-pdf{width:100%;height:600px}
        .viewer-controls{padding:12px;background:#fff;border-top:1px solid #eee;display:flex;gap:8px;justify-content:center}
        .pdf-nav{display:flex;align-items:center;gap:8px}
        .pdf-nav input{width:60px;padding:6px;border:1px solid var(--border-color);border-radius:4px}
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><div class="brand-logo"><i class='bx bxl-react'></i> CT-AI</div></div>
            <nav class="sidebar-menu">
                <div class="menu-group-title">Góc học tập</div>
                <button class="menu-btn" onclick="changeContent('theory', this)"><i class='bx bx-file'></i> Lý thuyết</button>
                <button class="menu-btn" onclick="changeContent('flashcard', this)"><i class='bx bx-card'></i> Flashcard</button>
                <button class="menu-btn" onclick="changeContent('exercises', this)"><i class='bx bx-edit'></i> Bài tập</button>
                <button class="menu-btn" onclick="changeContent('progress', this)"><i class='bx bx-chart'></i> Tiến độ</button>

                <div class="menu-group-title" style="margin-top:12px;">Góc thi thử</div>
                <button class="menu-btn" onclick="changeContent('mockexam', this)"><i class='bx bx-edit'></i> Thi thử</button>
                <button class="menu-btn" onclick="changeContent('history', this)"><i class='bx bx-history'></i> Lịch sử làm bài</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">Trang chủ / <span id="crumb">Lý thuyết</span></div>
            </header>

            <div class="content-scroll-area">
                <div id="dynamic-content"></div>
            </div>
        </main>
    </div>

    <!-- Media Viewer modal -->
    <div id="viewerModal">
        <div class="panel">
            <div id="viewerHeader">
                <strong id="viewerTitle">Xem tài liệu</strong>
                <button onclick="closeViewer()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
            </div>
            <div id="viewerBody" style="flex:1;overflow:auto;padding:12px;"></div>
            <div id="viewerControls" class="viewer-controls" style="display:none;"></div>
        </div>
    </div>

    <script>
        // Initialize PDF.js
        if(typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Sample data: Chapters with materials
        const CHAPTERS_DATA = [
            {
                id: 1,
                name: 'CHƯƠNG 1: Giới thiệu cơ bản',
                materials: [
                    { id: 1, name: 'Bài 1: Bảng Hiragana', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 2, name: 'Video giới thiệu', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' }
                ]
            },
            {
                id: 2,
                name: 'CHƯƠNG 2: Ngữ pháp cơ bản',
                materials: [
                    { id: 3, name: 'Bài giảng 1', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 4, name: 'Bài tập thực hành', type: 'xlsx', url: 'https://example.com/baitap.xlsx' }
                ]
            },
            {
                id: 3,
                name: 'CHƯƠNG 3: Phát âm & Tones',
                materials: [
                    { id: 5, name: 'Video phát âm', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' },
                    { id: 6, name: 'Tài liệu tham khảo', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' }
                ]
            },
            {
                id: 4,
                name: 'CHƯƠNG 4: Hội thoại thường ngày',
                materials: [
                    { id: 7, name: 'Bài hội thoại 1', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' },
                    { id: 8, name: 'Script hội thoại', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' }
                ]
            },
            {
                id: 5,
                name: 'CHƯƠNG 5: Văn hóa & Quán tục',
                materials: [
                    { id: 9, name: 'Tài liệu văn hóa', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 10, name: 'Video tài liệu', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' }
                ]
            },
            {
                id: 6,
                name: 'CHƯƠNG 6: Ôn tập & Luyện thi',
                materials: [
                    { id: 11, name: 'Đề ôn tập', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 12, name: 'Bộ câu hỏi thử', type: 'xlsx', url: 'https://example.com/cauhoi.xlsx' }
                ]
            },
            {
                id: 7,
                name: 'CHƯƠNG 7: Chuyên đề nâng cao',
                materials: [
                    { id: 13, name: 'Bài giảng nâng cao', type: 'pptx', url: 'https://example.com/nangcao.pptx' },
                    { id: 14, name: 'Kỹ năng thi JLPT', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' }
                ]
            }
        ];

        // Storage and initial data
        const STORAGE_KEYS = { flashcards: 'ctai_flashcards_v2', questions: 'ctai_questions_v2', history: 'ctai_history_v2' };
        const DEFAULT_FLASHCARDS = [ {front: 'Hiragana: あ', back: 'Âm "a"'}, {front: '学生', back: 'Học sinh'} ];
        const DEFAULT_QUESTIONS = [ {id:1, question:'Hiragana "あ" đọc là gì?', choices:['a','i','u','e'], answer:0, explain:'Ký tự あ đọc là "a".'} ];

        function loadOrDefault(key, def){ try{ const raw = localStorage.getItem(key); return raw?JSON.parse(raw):(saveAndReturn(key, def), def); }catch(e){console.error(e);return def;} }
        function saveAndReturn(key, value){ localStorage.setItem(key, JSON.stringify(value)); return value; }

        let flashcards = loadOrDefault(STORAGE_KEYS.flashcards, DEFAULT_FLASHCARDS);
        let questions = loadOrDefault(STORAGE_KEYS.questions, DEFAULT_QUESTIONS);
        let historyItems = loadOrDefault(STORAGE_KEYS.history, []);
        let currentChapter = null;

        // Content renderers
        function changeContent(page, btnEl){
            document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            
            const breadcrumbMap = {
                theory: 'Lý thuyết',
                flashcard: 'Flashcard',
                exercises: 'Bài tập',
                progress: 'Tiến độ',
                mockexam: 'Thi thử',
                history: 'Lịch sử làm bài'
            };
            document.getElementById('crumb').innerText = breadcrumbMap[page] || 'Trang chủ';
            
            if(page==='theory') renderTheory();
            else if(page==='flashcard') renderFlashcards();
            else if(page==='exercises') renderExercises();
            else if(page==='progress') renderProgress();
            else if(page==='mockexam') renderMockExam();
            else if(page==='history') renderHistory();
        }

        // Theory with Chapters
        function renderTheory(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Lý thuyết & Tài liệu</h2>
                <p class="small" style="margin-bottom:16px;">Chọn một chương để xem tài liệu học tập</p>
                <div class="chapter-grid" id="chapterGrid"></div>`;
            
            const grid = document.getElementById('chapterGrid');
            CHAPTERS_DATA.forEach(chapter => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.onclick = () => showChapterMaterials(chapter);
                card.innerHTML = `
                    <h3><i class='bx bx-book'></i> ${chapter.name}</h3>
                    <p>${chapter.materials.length} tài liệu</p>
                    <button class="btn primary" style="width:100%;margin-top:8px;">Xem chi tiết</button>`;
                grid.appendChild(card);
            });
        }

        function showChapterMaterials(chapter){
            currentChapter = chapter;
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <button class="btn" onclick="renderTheory()"><i class='bx bx-arrow-back'></i> Quay lại</button>
                    <h2 class="section-title" style="margin:0;">${chapter.name}</h2>
                </div>
                <div id="materialsContainer"></div>`;
            
            const container = document.getElementById('materialsContainer');
            if(chapter.materials.length === 0){
                container.innerHTML = '<p class="small">Chưa có tài liệu.</p>';
                return;
            }

            chapter.materials.forEach(material => {
                const item = document.createElement('div');
                item.className = 'material-item';
                const icons = {
                    'pdf': '📄',
                    'mp4': '🎬',
                    'pptx': '📊',
                    'xlsx': '📈'
                };
                item.innerHTML = `
                    <div class="material-icon">${icons[material.type] || '📎'}</div>
                    <div class="material-info">
                        <strong>${material.name}</strong>
                        <span>${material.type.toUpperCase()}</span>
                    </div>
                    <i class='bx bx-chevron-right' style="font-size:1.5rem;color:var(--text-gray);"></i>`;
                item.onclick = () => openMediaViewer(material);
                container.appendChild(item);
            });
        }

        // Media Viewer
        let pdfDoc = null;
        let currentPdfPage = 1;

        function openMediaViewer(material){
            const title = material.name;
            const body = document.getElementById('viewerBody');
            const controls = document.getElementById('viewerControls');
            const header = document.getElementById('viewerHeader');

            document.getElementById('viewerTitle').innerText = title;
            body.innerHTML = '';
            controls.innerHTML = '';
            controls.style.display = 'none';

            if(material.type === 'mp4'){
                body.innerHTML = `<video class="viewer-video" controls><source src="${material.url}" type="video/mp4">Trình duyệt của bạn không hỗ trợ video.</video>`;
            }
            else if(material.type === 'pdf'){
                body.innerHTML = '<canvas id="pdfCanvas" style="max-width:100%;"></canvas><p id="pdfStatus" style="text-align:center;margin-top:10px;"></p>';
                controls.innerHTML = `
                    <div class="pdf-nav">
                        <button class="btn" onclick="previousPage()">&lt; Trước</button>
                        <span>Trang <input id="pageNum" type="number" value="1"> / <span id="pageCount">-</span></span>
                        <button class="btn" onclick="nextPage()">Sau &gt;</button>
                    </div>`;
                controls.style.display = 'flex';
                loadPdf(material.url);
            }
            else if(material.type === 'pptx' || material.type === 'xlsx'){
                body.innerHTML = `<div style="text-align:center;padding:40px;"><p>Tài liệu ${material.type.toUpperCase()}</p><p class="small">Tính năng xem trực tuyến sẽ được cập nhật</p><a href="${material.url}" class="btn primary" style="display:inline-block;margin-top:16px;">Tải xuống</a></div>`;
            }

            document.getElementById('viewerModal').style.display = 'flex';
        }

        function loadPdf(url){
            if(typeof pdfjsLib === 'undefined'){
                document.getElementById('viewerBody').innerHTML = '<p>Không thể tải PDF. Vui lòng tải xuống.</p>';
                return;
            }
            pdfjsLib.getDocument(url).promise.then(pdf => {
                pdfDoc = pdf;
                document.getElementById('pageCount').innerText = pdf.numPages;
                currentPdfPage = 1;
                renderPdfPage(1);
            }).catch(err => {
                console.error('PDF Error:', err);
                document.getElementById('viewerBody').innerHTML = '<p>Lỗi khi tải PDF</p>';
            });
        }

        function renderPdfPage(pageNum){
            if(!pdfDoc) return;
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                    currentPdfPage = pageNum;
                    document.getElementById('pageNum').value = pageNum;
                });
            });
        }

        function nextPage(){
            if(pdfDoc && currentPdfPage < pdfDoc.numPages){
                renderPdfPage(currentPdfPage + 1);
            }
        }

        function previousPage(){
            if(currentPdfPage > 1){
                renderPdfPage(currentPdfPage - 1);
            }
        }

        function closeViewer(){
            document.getElementById('viewerModal').style.display = 'none';
            document.getElementById('viewerBody').innerHTML = '';
            pdfDoc = null;
        }

        // Flashcards
        let fcIndex = 0;
        function renderFlashcards(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Flashcard</h2>
                <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
                    <div class="card-viewport">
                        <div id="flashcard" class="flashcard" onclick="flipCard()">
                            <div class="side front" id="fcFront"></div>
                            <div class="side back" id="fcBack"></div>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <div style="display:flex;gap:8px;">
                            <button class="btn" onclick="prevCard()">Prev</button>
                            <button class="btn" onclick="nextCard()">Next</button>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn primary" onclick="markKnown()">Đã nhớ</button>
                            <button class="btn" onclick="shuffleFlashcards()">Shuffle</button>
                        </div>
                    </div>
                </div>`;
            fcIndex=0;
            renderFlashcardCard();
        }
        function renderFlashcardCard(){
            const el = document.getElementById('flashcard');
            if(!el) return;
            if(flashcards.length===0){
                el.innerHTML='<div style="padding:16px;">Chưa có flashcard.</div>';
                return;
            }
            const card = flashcards[fcIndex];
            document.getElementById('fcFront').innerText = card.front;
            document.getElementById('fcBack').innerText = card.back;
        }
        function flipCard(){
            const el=document.getElementById('flashcard');
            if(el) el.classList.toggle('flipped');
        }
        function nextCard(){
            if(flashcards.length===0) return;
            fcIndex=(fcIndex+1)%flashcards.length;
            document.getElementById('flashcard').classList.remove('flipped');
            renderFlashcardCard();
        }
        function prevCard(){
            if(flashcards.length===0) return;
            fcIndex=(fcIndex-1+flashcards.length)%flashcards.length;
            document.getElementById('flashcard').classList.remove('flipped');
            renderFlashcardCard();
        }
        function markKnown(){
            alert('Đã đánh dấu là nhớ.');
            renderFlashcardCard();
        }
        function shuffleFlashcards(){
            flashcards = flashcards.sort(()=>Math.random()-0.5);
            saveAndReturn(STORAGE_KEYS.flashcards, flashcards);
            fcIndex = 0;
            renderFlashcardCard();
        }

        // Exercises
        function renderExercises(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Bài tập</h2>
                <div class="quiz" id="quizArea"></div>`;
            renderQuizList();
        }
        function renderQuizList(){
            const area = document.getElementById('quizArea');
            area.innerHTML='';
            if(questions.length===0){
                area.innerHTML='<div class="small">Chưa có bài tập.</div>';
                return;
            }
            questions.forEach(q=>{
                const qdiv = document.createElement('div');
                qdiv.className = 'question';
                let optionsHtml = '';
                q.choices.forEach((c,i)=>{
                    optionsHtml += `<div class="option" data-q="${q.id}" data-idx="${i}" onclick="handleOptionClick(this)">${c}</div>`;
                });
                qdiv.innerHTML = `<strong>${q.question}</strong><div class="options">${optionsHtml}</div><div class="explain">${q.explain}</div>`;
                area.appendChild(qdiv);
            });
        }
        function handleOptionClick(el){
            const qid = Number(el.getAttribute('data-q'));
            const idx = Number(el.getAttribute('data-idx'));
            const q = questions.find(x=>x.id===qid);
            const parent = el.parentElement;
            Array.from(parent.children).forEach(o=>{
                o.classList.remove('correct','incorrect');
                const oidx = Number(o.getAttribute('data-idx'));
                if(oidx === q.answer) o.classList.add('correct');
                else if(oidx === idx) o.classList.add('incorrect');
            });
            parent.nextElementSibling.style.display='block';
        }

        // Mock exam (Thi thử)
        let mockSession = null;
        function renderMockExam(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Thi thử</h2>
                <div style="margin-bottom:10px;">
                    <label class="small">Số câu: </label>
                    <select id="mockCount"><option>3</option><option>5</option><option>10</option></select>
                    <button class="btn primary" onclick="startMock()">Bắt đầu</button>
                </div>
                <div id="mockArea"></div>`;
        }
        function startMock(){
            const n = Number(document.getElementById('mockCount').value);
            if(questions.length===0){
                alert('Chưa có câu hỏi để thi.');
                return;
            }
            const pool = [...questions].sort(()=>Math.random()-0.5).slice(0,n);
            mockSession = { pool, answers: {} };
            renderMockQuestions();
        }
        function renderMockQuestions(){
            const area = document.getElementById('mockArea');
            area.innerHTML = '';
            mockSession.pool.forEach((q, idx)=>{
                const qdiv = document.createElement('div');
                qdiv.className = 'question';
                let optionsHtml = '';
                q.choices.forEach((c,i)=>{
                    optionsHtml += `<div class="option" data-qi="${idx}" data-idx="${i}" onclick="mockChoose(this)">${c}</div>`;
                });
                qdiv.innerHTML = `<strong>${idx+1}. ${q.question}</strong><div class="options">${optionsHtml}</div>`;
                area.appendChild(qdiv);
            });
            const btn = document.createElement('button');
            btn.className = 'btn primary';
            btn.innerText = 'Nộp bài';
            btn.onclick = finishMock;
            area.appendChild(btn);
        }
        function mockChoose(el){
            const qi = Number(el.getAttribute('data-qi'));
            const ix = Number(el.getAttribute('data-idx'));
            const parent = el.parentElement;
            Array.from(parent.children).forEach(o=>o.style.background='');
            el.style.background='rgba(34,179,164,0.2)';
            mockSession.answers[qi] = ix;
        }
        function finishMock(){
            const total = mockSession.pool.length;
            let ok=0;
            mockSession.pool.forEach((q,i)=>{
                if(mockSession.answers[i]===q.answer) ok++;
            });
            const score = Math.round(100 * ok / total);
            const histItem = { date: new Date().toLocaleString('vi-VN'), score };
            historyItems.push(histItem);
            saveAndReturn(STORAGE_KEYS.history, historyItems);
            alert(`Kết quả: ${ok}/${total} (${score}%)`);
            renderMockExam();
        }

        // History
        function renderHistory(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `<h2 class="section-title">Lịch sử làm bài</h2><div id="historyList"></div>`;
            const listDiv = document.getElementById('historyList');
            if(historyItems.length===0){
                listDiv.innerHTML='<div class="small">Chưa có lịch sử.</div>';
                return;
            }
            historyItems.slice().reverse().forEach(h=>{
                const item = document.createElement('div');
                item.className = 'question';
                item.innerHTML = `<strong>${h.date}</strong><br/><span class="small">Điểm: ${h.score}%</span>`;
                listDiv.appendChild(item);
            });
        }

        // Progress (Chart.js)
        let progressChart = null;
        function renderProgress(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Tiến độ học tập</h2>
                <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
                    <div style="width:420px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">
                        <h4>Tiến độ cá nhân</h4>
                        <canvas id="progressCanvas" width="400" height="240"></canvas>
                        <div style="margin-top:10px;" id="avgScoreDisplay"></div>
                    </div>
                    <div style="flex:1;min-width:320px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">
                        <h4>Chi tiết</h4>
                        <div id="progressList"><div class="small">Không có dữ liệu khóa cụ thể.</div></div>
                    </div>
                </div>`;
            const ctx = document.getElementById('progressCanvas').getContext('2d');
            const labels = ['Tổng tiến độ'];
            const data = [0];
            if(historyItems.length > 0){
                const avgScore = Math.round(historyItems.reduce((s,h)=>s+h.score,0) / historyItems.length);
                data[0] = avgScore;
                document.getElementById('avgScoreDisplay').innerHTML = `<strong>Điểm trung bình: ${avgScore}%</strong>`;
            }
            if(progressChart) progressChart.destroy();
            progressChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Điểm (%)', data, backgroundColor: '#22b3a4' }] },
                options: { responsive:true, plugins: { legend: { display:false } }, scales: { y: { max:100 } } }
            });
        }

        function init(){
            changeContent('theory');
        }
        init();

        window.changeContent = changeContent;
        window.closeViewer = closeViewer;
    </script>
</body>
</html>
