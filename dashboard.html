<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hệ thống luyện thi CT-AI - Góc học tập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <style>
        :root{--primary:#22b3a4;--bg-main:#f4f6f8;--bg-card:#fff;--text-dark:#1f2937;--text-gray:#6b7280;--border-color:#e5e7eb;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
        body{background:var(--bg-main);color:var(--text-dark);display:flex;height:100vh;overflow:hidden}
        .layout-wrapper{display:flex;width:100%;height:100%}
        .sidebar{background:var(--bg-card);width:300px;display:flex;flex-direction:column;border-right:1px solid var(--border-color)}
        .brand{padding:18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-color)}
        .brand-logo{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--primary)}
        .sidebar-menu{flex-grow:1;overflow-y:auto;padding:16px}
        .menu-group-title{font-size:.9rem;font-weight:600;margin:8px 0 8px 6px;color:var(--text-dark)}
        .menu-btn{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;padding:12px 14px;margin-bottom:8px;border-radius:8px;color:var(--text-dark);font-size:.95rem;cursor:pointer}
        .menu-btn i{font-size:1.1rem;color:var(--text-gray)}
        .menu-btn:hover{background:rgba(34,179,164,0.06)}
        .menu-btn.active{background:var(--primary);color:#fff}
        .menu-btn.active i{color:#fff}
        .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .top-header{background:var(--bg-card);padding:12px 18px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
        .content-scroll-area{flex-grow:1;padding:20px;overflow-y:auto}
        .breadcrumb{font-size:.95rem;color:var(--text-gray);margin-bottom:12px}
        .section-title{font-size:1.15rem;font-weight:600;margin-bottom:12px}
        .small{font-size:.9rem;color:var(--text-gray)}
        .flashcard{width:360px;height:220px;border-radius:12px;position:relative;transform-style:preserve-3d;transition:transform .6s;box-shadow:0 6px 18px rgba(0,0,0,.08);cursor:pointer;background:linear-gradient(135deg,#fff,#f7fafc);display:flex;align-items:center;justify-content:center;padding:18px}
        .flashcard .side{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;padding:18px}
        .flashcard .back{transform:rotateY(180deg)}
        .flashcard.flipped{transform:rotateY(180deg)}
        .btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer}
        .btn.primary{background:var(--primary);color:#fff;border:0}
        .question{background:var(--bg-card);padding:12px;border-radius:8px;border:1px solid var(--border-color);margin-bottom:12px}
        .options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .option{padding:10px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer}
        .option.correct{background:#dcfce3;border-color:#86efac}
        .option.incorrect{background:#fee2e2;border-color:#fca5a5}
        .explain{margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid var(--border-color);display:none}
        @media(max-width:900px){.sidebar{display:none}}
        /* modal */
        #viewerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;align-items:center;justify-content:center;padding:18px}
        #viewerModal .panel{width:100%;max-width:980px;background:#fff;border-radius:8px;overflow:hidden}
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><div class="brand-logo"><i class='bx bxl-react'></i> CT-AI</div></div>
            <nav class="sidebar-menu">
                <div class="menu-group-title">Góc học tập</div>
                <button class="menu-btn active" onclick="changeContent('theory', this)"><i class='bx bx-file'></i> Lý thuyết</button>
                <button class="menu-btn" onclick="changeContent('flashcard', this)"><i class='bx bx-card'></i> Flashcard</button>
                <button class="menu-btn" onclick="changeContent('exercises', this)"><i class='bx bx-edit'></i> Bài tập</button>
                <button class="menu-btn" onclick="changeContent('progress', this)"><i class='bx bx-chart'></i> Tiến độ</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">Trang chủ / <span id="crumb">Lý thuyết</span></div>
            </header>

            <div class="content-scroll-area">
                <div id="dynamic-content"></div>
            </div>
        </main>
    </div>

    <!-- Viewer modal -->
    <div id="viewerModal">
        <div class="panel">
            <div style="padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;">
                <strong id="viewerTitle">Xem tài liệu</strong>
                <button onclick="closeViewer()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button>
            </div>
            <div id="viewerBody" style="padding:12px;min-height:240px;"></div>
        </div>
    </div>

    <script>
        // Minimal data and storage keys
        const STORAGE_KEYS = { flashcards: 'ctai_flashcards_v2', questions: 'ctai_questions_v2', courses: 'ctai_courses_v2' };
        const DEFAULT_COURSES = [ { id: 'c_n4', title: 'Khóa N4', author: 'CT-AI', date:'2026-01-01', progress: 12 } ];
        const DEFAULT_FLASHCARDS = [ {front: 'Hiragana: あ', back: 'Âm "a"'}, {front: '学生', back: 'Học sinh'} ];
        const DEFAULT_QUESTIONS = [ {id:1, question:'Hiragana "あ" đọc là gì?', choices:['a','i','u','e'], answer:0, explain:'Ký tự あ đọc là "a".'} ];

        function loadOrDefault(key, def){ try{ const raw = localStorage.getItem(key); return raw?JSON.parse(raw):(saveAndReturn(key, def), def); }catch(e){console.error(e);return def;} }
        function saveAndReturn(key, value){ localStorage.setItem(key, JSON.stringify(value)); return value; }

        let flashcards = loadOrDefault(STORAGE_KEYS.flashcards, DEFAULT_FLASHCARDS);
        let questions = loadOrDefault(STORAGE_KEYS.questions, DEFAULT_QUESTIONS);
        let courses = loadOrDefault(STORAGE_KEYS.courses, DEFAULT_COURSES);

        // Content renderers
        function changeContent(page, btnEl){ document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active')); if(btnEl) btnEl.classList.add('active');
            document.getElementById('crumb').innerText = ({theory:'Lý thuyết',flashcard:'Flashcard',exercises:'Bài tập',progress:'Tiến độ'})[page] || '';
            if(page==='theory') renderTheory(); else if(page==='flashcard') renderFlashcards(); else if(page==='exercises') renderExercises(); else if(page==='progress') renderProgress(); }

        // Viewer
        function openViewer(title, htmlContent){ document.getElementById('viewerTitle').innerText = title; document.getElementById('viewerBody').innerHTML = htmlContent; document.getElementById('viewerModal').style.display='flex'; }
        function closeViewer(){ document.getElementById('viewerModal').style.display='none'; document.getElementById('viewerBody').innerHTML=''; }

        function renderTheory(){ const content = document.getElementById('dynamic-content'); content.innerHTML = `\n            <h2 class="section-title">Lý thuyết & Tài liệu</h2>\n            <div style="display:flex;gap:12px;flex-wrap:wrap;">\n                <div style="width:320px;background:var(--bg-card);border:1px solid var(--border-color);padding:12px;border-radius:10px;">\n                    <h4>Bảng chữ cái Hiragana</h4>\n                    <p class="small">Tài liệu tổng hợp - PDF mẫu</p>\n                    <div style="margin-top:10px;display:flex;gap:8px;">\n                        <button class="btn" onclick="openViewer('Bảng chữ cái Hiragana','<iframe src=\"https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf\" style=\"width:100%;height:520px;border:0\"></iframe>')">Xem PDF</button>\n                    </div>\n                </div>\n                <div style="width:320px;background:var(--bg-card);border:1px solid var(--border-color);padding:12px;border-radius:10px;">\n                    <h4>Ngữ pháp cơ bản</h4>\n                    <p class="small">Tóm tắt ngữ pháp</p>\n                    <div style="margin-top:10px;display:flex;gap:8px;">\n                        <button class="btn" onclick="openViewer('Ngữ pháp cơ bản','<div style=\\"padding:12px;max-height:520px;overflow:auto;\\">\n                        <h3>Ngữ pháp: は (wa)</h3><p>は đánh dấu chủ đề câu.</p>\n                        <h3>Ngữ pháp: が (ga)</h3><p>が đánh dấu chủ ngữ mới hoặc chủ thể hành động.</p>\n                        </div>')">Xem</button>\n                    </div>\n                </div>\n            </div>`; }

        // Flashcards
        let fcIndex = 0;
        function renderFlashcards(){ const content = document.getElementById('dynamic-content'); content.innerHTML = `\n            <h2 class="section-title">Flashcard</h2>\n            <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">\n                <div class="card-viewport">\n                    <div id="flashcard" class="flashcard" onclick="flipCard()">\n                        <div class="side front" id="fcFront"></div>\n                        <div class="side back" id="fcBack"></div>\n                    </div>\n                </div>\n                <div style="display:flex;flex-direction:column;gap:8px;">\n                    <div style="display:flex;gap:8px;">\n                        <button class="btn" onclick="prevCard()">Prev</button>\n                        <button class="btn" onclick="nextCard()">Next</button>\n                    </div>\n                    <div style="display:flex;gap:8px;">\n                        <button class="btn primary" onclick="markKnown()">Đã nhớ</button>\n                        <button class="btn" onclick="shuffleFlashcards()">Shuffle</button>\n                    </div>\n                </div>\n            </div>`; fcIndex=0; renderFlashcardCard(); }
        function renderFlashcardCard(){ const el = document.getElementById('flashcard'); if(!el) return; if(flashcards.length===0){ el.innerHTML='<div style="padding:16px;">Chưa có flashcard.</div>'; return; } const f = flashcards[fcIndex]; document.getElementById('fcFront').innerHTML = `<div style="font-size:1.05rem;font-weight:600">${escapeHtml(f.front)}</div>`; document.getElementById('fcBack').innerHTML = `<div style="font-size:1rem;color:var(--text-gray)">${escapeHtml(f.back)}</div>`; el.classList.remove('flipped'); }
        function flipCard(){ const el=document.getElementById('flashcard'); if(el) el.classList.toggle('flipped'); }
        function nextCard(){ if(flashcards.length===0) return; fcIndex=(fcIndex+1)%flashcards.length; renderFlashcardCard(); }
        function prevCard(){ if(flashcards.length===0) return; fcIndex=(fcIndex-1+flashcards.length)%flashcards.length; renderFlashcardCard(); }
        function markKnown(){ courses[0].progress = Math.min(100, courses[0].progress + 5); saveAndReturn(STORAGE_KEYS.courses, courses); updateCourseBars(); renderFlashcardCard(); }
        function shuffleFlashcards(){ flashcards = flashcards.sort(()=>Math.random()-0.5); saveAndReturn(STORAGE_KEYS.flashcards, flashcards); renderFlashcardCard(); }

        // Exercises
        function renderExercises(){ const content = document.getElementById('dynamic-content'); content.innerHTML = `\n            <h2 class="section-title">Bài tập</h2>\n            <div class="quiz" id="quizArea"></div>`; renderQuizList(); }
        function renderQuizList(){ const area = document.getElementById('quizArea'); area.innerHTML=''; if(questions.length===0){ area.innerHTML='<div class="small">Chưa có bài tập.</div>'; return; } questions.forEach(q=>{ const qdiv=document.createElement('div'); qdiv.className='question'; const opts = q.choices.map((c, idx)=>`<div class="option" data-q="${q.id}" data-idx="${idx}" onclick="handleOptionClick(this)">${escapeHtml(c)}</div>`).join(''); qdiv.innerHTML = `<div><strong>${escapeHtml(q.question)}</strong></div><div class="options">${opts}</div><div class="explain" id="explain_${q.id}">${escapeHtml(q.explain||'')}</div>`; area.appendChild(qdiv); }); }
        function handleOptionClick(el){ const qid = Number(el.getAttribute('data-q')); const idx = Number(el.getAttribute('data-idx')); const q = questions.find(x=>x.id===qid); const parent = el.parentElement; Array.from(parent.children).forEach(opt=>{ opt.style.pointerEvents='none'; opt.classList.remove('correct','incorrect'); }); if(idx===q.answer) el.classList.add('correct'); else { el.classList.add('incorrect'); const correctEl = parent.querySelector(`[data-idx="${q.answer}"]`); if(correctEl) correctEl.classList.add('correct'); } const ex = document.getElementById('explain_'+qid); if(ex) ex.style.display='block'; }

        // Progress (Chart.js)
        let progressChart = null;
        function renderProgress(){ const content = document.getElementById('dynamic-content'); content.innerHTML = `\n            <h2 class="section-title">Tiến độ học tập</h2>\n            <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">\n                <div style="width:420px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">\n                    <h4>Tiến độ cá nhân</h4>\n                    <canvas id="progressCanvas" width="400" height="240"></canvas>\n                    <div style="margin-top:10px;" id="avgScoreDisplay"></div>\n                </div>\n                <div style="flex:1;min-width:320px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">\n                    <h4>Chi tiết khóa</h4>\n                    <div id="progressList"></div>\n                </div>\n            </div>`;
            const ctx = document.getElementById('progressCanvas').getContext('2d'); const labels = courses.map(c=>c.title); const data = courses.map(c=>c.progress); if(progressChart) progressChart.destroy(); progressChart = new Chart(ctx, { type:'doughnut', data:{ labels, datasets:[{ data, backgroundColor:['#22b3a4','#fbbf24','#60a5fa','#a78bfa'] }] }, options:{plugins:{legend:{position:'bottom'}}} ); document.getElementById('avgScoreDisplay').innerHTML = `<div class="small">Điểm trung bình (mô phỏng): ${computeAvgScore()}%</div>`; const list = document.getElementById('progressList'); list.innerHTML=''; courses.forEach(c=>{ const d=document.createElement('div'); d.style.marginBottom='8px'; d.innerHTML = `<strong>${c.title}</strong><div class="small">Tiến trình: ${c.progress}%</div><div class="progress-bar-bg" style="margin-top:8px"><div class="progress-bar-fill" style="height:8px;background:var(--primary);width:${c.progress}%;border-radius:6px"></div></div>`; list.appendChild(d); }); }
        function computeAvgScore(){ if(!courses || courses.length===0) return 0; return Math.round(courses.reduce((a,b)=>a+b.progress,0)/courses.length); }

        // Helpers
        function updateCourseBars(){ try{ if(progressChart) progressChart.data.datasets[0].data = courses.map(x=>x.progress); if(progressChart) progressChart.update(); }catch(e){} }
        function escapeHtml(s){ if(!s) return ''; return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

        function init(){ changeContent('theory'); updateCourseBars(); }
        init();

        window.changeContent = changeContent; window.openViewer = openViewer; window.closeViewer = closeViewer;
    </script>
</body>
</html>
