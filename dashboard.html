<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hệ thống luyện thi CT-AI - Góc học tập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root{--primary:#22b3a4;--bg-main:#f4f6f8;--bg-card:#fff;--text-dark:#1f2937;--text-gray:#6b7280;--border-color:#e5e7eb;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
        body{background:var(--bg-main);color:var(--text-dark);display:flex;height:100vh;overflow:hidden}
        .layout-wrapper{display:flex;width:100%;height:100%}
        .sidebar{background:var(--bg-card);width:300px;display:flex;flex-direction:column;border-right:1px solid var(--border-color)}
        .brand{padding:18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-color)}
        .brand-logo{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--primary)}
        .sidebar-menu{flex-grow:1;overflow-y:auto;padding:16px}
        .menu-group-title{font-size:.9rem;font-weight:600;margin:8px 0 8px 6px;color:var(--text-dark)}
        .menu-btn{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;padding:12px 14px;margin-bottom:8px;border-radius:8px;color:var(--text-dark);font-size:.95rem;cursor:pointer;transition:all .2s}
        .menu-btn i{font-size:1.1rem;color:var(--text-gray)}
        .menu-btn:hover{background:rgba(34,179,164,0.06)}
        .menu-btn.active{background:var(--primary);color:#fff}
        .menu-btn.active i{color:#fff}
        .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .top-header{background:var(--bg-card);padding:12px 18px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
        .content-scroll-area{flex-grow:1;padding:20px;overflow-y:auto}
        .breadcrumb{font-size:.95rem;color:var(--text-gray);margin-bottom:12px}
        .section-title{font-size:1.15rem;font-weight:600;margin-bottom:12px}
        .small{font-size:.9rem;color:var(--text-gray)}
        .flashcard{width:360px;height:220px;border-radius:12px;position:relative;transform-style:preserve-3d;transition:transform .6s;box-shadow:0 6px 18px rgba(0,0,0,.08);cursor:pointer;background:linear-gradient(135deg,#fff 0%,#f9fafb 100%)}
        .flashcard .side{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;padding:18px}
        .flashcard .back{transform:rotateY(180deg)}
        .flashcard.flipped{transform:rotateY(180deg)}
        .btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer;transition:all .2s}
        .btn:hover{background:rgba(34,179,164,0.1)}
        .btn.primary{background:var(--primary);color:#fff;border:0}
        .btn.primary:hover{background:#1a9885}
        .question{background:var(--bg-card);padding:12px;border-radius:8px;border:1px solid var(--border-color);margin-bottom:12px}
        .options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .option{padding:10px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer}
        .option.correct{background:#dcfce3;border-color:#86efac}
        .option.incorrect{background:#fee2e2;border-color:#fca5a5}
        .explain{margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid var(--border-color);display:none}
        
        /* Chapter Table Styles */
        .chapter-table{width:100%;border-collapse:collapse;margin-top:16px;background:var(--bg-card);border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .chapter-table thead{background:var(--primary);color:#fff}
        .chapter-table th{padding:14px;text-align:left;font-weight:600;border-bottom:2px solid var(--border-color)}
        .chapter-table td{padding:14px;border-bottom:1px solid var(--border-color)}
        .chapter-table tbody tr:hover{background:rgba(34,179,164,0.05)}
        .chapter-table tbody tr:last-child td{border-bottom:none}
        .chapter-column-1{width:15%;font-weight:600;color:var(--primary)}
        .chapter-column-2{width:65%;color:var(--text-dark)}
        .chapter-column-3{width:20%;text-align:center}
        
        /* Material Styles */
        .material-item{background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
        .material-item:hover{background:rgba(34,179,164,0.05);border-color:var(--primary)}
        .material-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(34,179,164,0.1);font-size:1.2rem}
        .material-info{flex:1}
        .material-info strong{display:block;color:var(--text-dark);margin-bottom:4px}
        .material-info span{font-size:.85rem;color:var(--text-gray)}
        
        .exercise-layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
        .exercise-chapter-menu{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px}
        .chapter-chip{width:100%;text-align:left;padding:10px 12px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer}
        .chapter-chip:hover{background:rgba(34,179,164,.08)}
        .chapter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .exercise-panel{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:14px}
        .exercise-admin-toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
        .exercise-exam-item{border:1px solid var(--border-color);border-radius:8px;padding:12px;background:#fff;margin-bottom:10px}
        .exercise-exam-item h4{margin-bottom:6px}
        .exercise-form{display:flex;flex-direction:column;gap:10px}
        .exercise-form input,.exercise-form select,.exercise-form textarea{padding:10px;border:1px solid var(--border-color);border-radius:8px;font-size:.95rem}
        .exercise-form textarea{min-height:200px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
        .exercise-preview-wrap{margin-top:14px;border:1px solid var(--border-color);border-radius:8px;overflow:hidden;background:#fff}
        .exercise-preview-head{padding:10px 12px;border-bottom:1px solid var(--border-color);background:#f9fafb;font-weight:600}
        .exercise-preview-frame{width:100%;height:360px;border:0;display:block;background:#fff}
        @media(max-width:900px){.exercise-layout{grid-template-columns:1fr}}
        /* Modal Styles */
        @media(max-width:900px){.sidebar{display:none}}
        #viewerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;align-items:center;justify-content:center;padding:18px}
        #viewerModal .panel{width:100%;max-width:1200px;background:#fff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;max-height:90vh}
        #viewerHeader{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee}
        #viewerBody{flex:1;padding:12px;overflow:auto;background:#f9fafb}
        .viewer-video{width:100%;max-height:600px}
        .viewer-pdf{width:100%;height:600px}
        .viewer-controls{padding:12px;background:#fff;border-top:1px solid #eee;display:flex;gap:8px;justify-content:center}
        .pdf-nav{display:flex;align-items:center;gap:8px}
        .pdf-nav input{width:60px;padding:6px;border:1px solid var(--border-color);border-radius:4px}
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="brand"><div class="brand-logo"><i class='bx bxl-react'></i> CT-AI</div></div>
            <nav class="sidebar-menu">
                <div class="menu-group-title">Góc học tập</div>
                <button class="menu-btn" onclick="changeContent('theory', this)"><i class='bx bx-file'></i> Lý thuyết</button>
                <button class="menu-btn" onclick="changeContent('flashcard', this)"><i class='bx bx-card'></i> Flashcard</button>
                <button class="menu-btn" onclick="changeContent('exercises', this)"><i class='bx bx-edit'></i> Bài tập</button>
                <button class="menu-btn" onclick="changeContent('progress', this)"><i class='bx bx-chart'></i> Tiến độ</button>

                <div class="menu-group-title" style="margin-top:12px;">Góc thi thử</div>
                <button class="menu-btn" onclick="changeContent('mockexam', this)"><i class='bx bx-edit'></i> Thi thử</button>
                <button class="menu-btn" onclick="changeContent('history', this)"><i class='bx bx-history'></i> Lịch sử làm bài</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumb">Trang chủ / <span id="crumb">Lý thuyết</span></div>
                <div id="authHeader" style="font-size:.9rem;display:flex;align-items:center;gap:12px;"></div>
            </header>

            <div class="content-scroll-area">
                <div id="dynamic-content"></div>
            </div>
        </main>
    </div>

    <!-- Media Viewer modal -->
    <div id="viewerModal">
        <div class="panel">
            <div id="viewerHeader">
                <strong id="viewerTitle">Xem tài liệu</strong>
                <button onclick="closeViewer()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
            </div>
            <div id="viewerBody" style="flex:1;overflow:auto;padding:12px;"></div>
            <div id="viewerControls" class="viewer-controls" style="display:none;"></div>
        </div>
    </div>

    <script>
        // Initialize PDF.js
        if(typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Sample data: Chapters with materials
        const CHAPTERS_DATA = [
            {
                id: 1,
                chapter: 'Chương 1',
                name: 'Introduction to Artificial Intelligence (Giới thiệu về AI)',
                materials: [
                    { id: 1, name: 'Giới thiệu AI cơ bản', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 2, name: 'Video nhập môn', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' }
                ]
            },
            {
                id: 2,
                chapter: 'Chương 2',
                name: 'Quality Characteristics for AI-Based Systems (Đặc tính Chất lượng cho Hệ thống AI)',
                materials: [
                    { id: 3, name: 'Đặc tính chất lượng', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 4, name: 'Bài tập thực hành', type: 'xlsx', url: 'https://example.com/baitap.xlsx' }
                ]
            },
            {
                id: 3,
                chapter: 'Chương 3',
                name: 'Machine Learning (Học máy)',
                materials: [
                    { id: 5, name: 'Bài giảng Machine Learning', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' },
                    { id: 6, name: 'Tài liệu ML nâng cao', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' }
                ]
            },
            {
                id: 4,
                chapter: 'Chương 4',
                name: 'Testing AI-Based Systems (Kiểm thử các hệ thống dựa trên AI - GenAI và LLM)',
                materials: [
                    { id: 7, name: 'Kiểm thử AI/GenAI', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 8, name: 'Video kiểm thử LLM', type: 'mp4', url: 'https://commondatastorage.googleapis.com/gtv-videos-library/sample/BigBuckBunny.mp4' }
                ]
            },
            {
                id: 5,
                chapter: 'Chương 5',
                name: 'Input Data Testing for Machine Learning Systems (Kiểm thử dữ liệu đầu vào cho hệ thống Học máy)',
                materials: [
                    { id: 9, name: 'Kiểm thử dữ liệu đầu vào', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 10, name: 'Các kỹ thuật kiểm thử', type: 'pptx', url: 'https://example.com/kythuattest.pptx' }
                ]
            },
            {
                id: 6,
                chapter: 'Chương 6',
                name: 'Model Testing for Machine Learning Systems (Kiểm thử mô hình cho hệ thống Học máy)',
                materials: [
                    { id: 11, name: 'Kiểm thử mô hình ML', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' },
                    { id: 12, name: 'Benchmark & Metrics', type: 'xlsx', url: 'https://example.com/metrics.xlsx' }
                ]
            },
            {
                id: 7,
                chapter: 'Chương 7',
                name: 'Machine Learning Development Testing (Kiểm thử quá trình phát triển Học máy)',
                materials: [
                    { id: 13, name: 'Quy trình phát triển ML', type: 'pptx', url: 'https://example.com/ml-dev.pptx' },
                    { id: 14, name: 'Best practices testing', type: 'pdf', url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf' }
                ]
            }
        ];

        // Storage and initial data
        const STORAGE_KEYS = { flashcards: 'ctai_flashcards_v2', questions: 'ctai_questions_v2', history: 'ctai_history_v2', exams: 'ctai_exams_v2' };
        const FC_CHAPTERS_KEY = 'ctai_fc_chapters_v1';
        const DEFAULT_FLASHCARDS = [ {front: 'Hiragana: あ', back: 'Âm "a"'}, {front: '学生', back: 'Học sinh'} ];
        const DEFAULT_FC_CHAPTERS = {
            "1": [ {front:'AI (Artificial Intelligence)', back:'Trí tuệ nhân tạo - công nghệ mô phỏng khả năng tư duy của con người'}, {front:'Machine Learning', back:'Học máy - nhánh của AI cho phép hệ thống tự học từ dữ liệu'}, {front:'Test Oracle', back:'Cơ chế xác định kết quả kiểm thử là đúng hay sai'} ],
            "2":[],"3":[],"4":[],"5":[],"6":[],"7":[]
        };
        const DEFAULT_QUESTIONS = [ {id:1, question:'Hiragana "あ" đọc là gì?', choices:['a','i','u','e'], answer:0, explain:'Ký tự あ đọc là "a".'} ];

        function loadOrDefault(key, def){ try{ const raw = localStorage.getItem(key); return raw?JSON.parse(raw):(saveAndReturn(key, def), def); }catch(e){console.error(e);return def;} }
        function saveAndReturn(key, value){ localStorage.setItem(key, JSON.stringify(value)); return value; }

        let flashcards = loadOrDefault(STORAGE_KEYS.flashcards, DEFAULT_FLASHCARDS);
        let fcChapters = loadOrDefault(FC_CHAPTERS_KEY, DEFAULT_FC_CHAPTERS);
        let selectedFcChapter = 1;
        let fcChapterIndex = 0;
        let questions = loadOrDefault(STORAGE_KEYS.questions, DEFAULT_QUESTIONS);
        let historyItems = loadOrDefault(STORAGE_KEYS.history, []);
        let exerciseExams = loadOrDefault(STORAGE_KEYS.exams, []);
        if(!Array.isArray(exerciseExams)) exerciseExams = [];
        let selectedExerciseChapter = 1;
        let currentChapter = null;

        function getLoggedInUser(){
            try { return JSON.parse(localStorage.getItem('loggedInUser') || 'null'); }
            catch(e){ return null; }
        }
        function isExerciseAdmin(){
            // Cơ chế tối thiểu: dùng role đã lưu khi đăng nhập (Admin/User) để bật quyền tạo đề thi.
            const user = getLoggedInUser();
            return !!(user && user.role === 'Admin');
        }
        function saveExerciseExams(){
            saveAndReturn(STORAGE_KEYS.exams, exerciseExams);
        }
        function generateExamId(){
            if(window.crypto && typeof window.crypto.randomUUID === 'function'){
                return window.crypto.randomUUID();
            }
            return `exam_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        }
        function escapeHtml(value){
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function sanitizeExamHtml(rawHtml){
            const parser = new DOMParser();
            const doc = parser.parseFromString(String(rawHtml || ''), 'text/html');
            doc.querySelectorAll('script, iframe, object, embed').forEach(node => node.remove());
            doc.querySelectorAll('*').forEach(node => {
                Array.from(node.attributes).forEach(attr => {
                    const key = attr.name.toLowerCase();
                    const val = String(attr.value || '').trim().toLowerCase();
                    if(key.startsWith('on')) node.removeAttribute(attr.name);
                    if((key === 'href' || key === 'src') && val.startsWith('javascript:')) node.removeAttribute(attr.name);
                });
            });
            return doc.body.innerHTML;
        }

        // Content renderers
        function changeContent(page, btnEl){
            document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));
            if(btnEl) btnEl.classList.add('active');
            
            const breadcrumbMap = {
                theory: 'Lý thuyết',
                flashcard: 'Flashcard',
                exercises: 'Bài tập',
                progress: 'Tiến độ',
                mockexam: 'Thi thử',
                history: 'Lịch sử làm bài'
            };
            document.getElementById('crumb').innerText = breadcrumbMap[page] || 'Trang chủ';
            
            if(page==='theory') renderTheory();
            else if(page==='flashcard') renderFlashcards();
            else if(page==='exercises') renderExercises();
            else if(page==='progress') renderProgress();
            else if(page==='mockexam') renderMockExam();
            else if(page==='history') renderHistory();
        }

        // Theory with Chapters Table
        function renderTheory(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Lý thuyết & Tài liệu</h2>
                <p class="small" style="margin-bottom:16px;">Chọn "Xem chi tiết" để xem tài liệu học tập của từng chương</p>
                <table class="chapter-table">
                    <thead>
                        <tr>
                            <th style="width:15%;">Chương</th>
                            <th style="width:65%;">Tên chương</th>
                            <th style="width:20%;text-align:center;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="chapterTableBody">
                    </tbody>
                </table>`;
            
            const tbody = document.getElementById('chapterTableBody');
            CHAPTERS_DATA.forEach(chapter => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="chapter-column-1">${chapter.chapter}</td>
                    <td class="chapter-column-2">${chapter.name}</td>
                    <td class="chapter-column-3">
                        <button class="btn primary" onclick="showChapterMaterials(${chapter.id})">Xem chi tiết</button>
                    </td>`;
                tbody.appendChild(row);
            });
        }

        function showChapterMaterials(chapterId){
            const chapter = CHAPTERS_DATA.find(c => c.id === chapterId);
            if(!chapter) return;
            
            currentChapter = chapter;
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <button class="btn" onclick="renderTheory()"><i class='bx bx-arrow-back'></i> Quay lại</button>
                    <h2 class="section-title" style="margin:0;">${chapter.chapter}: ${chapter.name}</h2>
                </div>
                <div id="materialsContainer"></div>`;
            
            const container = document.getElementById('materialsContainer');
            if(chapter.materials.length === 0){
                container.innerHTML = '<p class="small">Chưa có tài liệu.</p>';
                return;
            }

            chapter.materials.forEach(material => {
                const item = document.createElement('div');
                item.className = 'material-item';
                const icons = {
                    'pdf': '📄',
                    'mp4': '🎬',
                    'pptx': '📊',
                    'xlsx': '📈'
                };
                item.innerHTML = `
                    <div class="material-icon">${icons[material.type] || '📎'}</div>
                    <div class="material-info">
                        <strong>${material.name}</strong>
                        <span>${material.type.toUpperCase()}</span>
                    </div>
                    <i class='bx bx-chevron-right' style="font-size:1.5rem;color:var(--text-gray);"></i>`;
                item.onclick = () => openMediaViewer(material);
                container.appendChild(item);
            });
        }

        // Media Viewer
        let pdfDoc = null;
        let currentPdfPage = 1;

        function openMediaViewer(material){
            const title = material.name;
            const body = document.getElementById('viewerBody');
            const controls = document.getElementById('viewerControls');
            const header = document.getElementById('viewerHeader');

            document.getElementById('viewerTitle').innerText = title;
            body.innerHTML = '';
            controls.innerHTML = '';
            controls.style.display = 'none';

            if(material.type === 'mp4'){
                body.innerHTML = `<video class="viewer-video" controls><source src="${material.url}" type="video/mp4">Trình duyệt của bạn không hỗ trợ video.</video>`;
            }
            else if(material.type === 'pdf'){
                body.innerHTML = '<canvas id="pdfCanvas" style="max-width:100%;"></canvas><p id="pdfStatus" style="text-align:center;margin-top:10px;"></p>';
                controls.innerHTML = `
                    <div class="pdf-nav">
                        <button class="btn" onclick="previousPage()">&lt; Trước</button>
                        <span>Trang <input id="pageNum" type="number" value="1"> / <span id="pageCount">-</span></span>
                        <button class="btn" onclick="nextPage()">Sau &gt;</button>
                    </div>`;
                controls.style.display = 'flex';
                loadPdf(material.url);
            }
            else if(material.type === 'pptx' || material.type === 'xlsx'){
                body.innerHTML = `<div style="text-align:center;padding:40px;"><p>Tài liệu ${material.type.toUpperCase()}</p><p class="small">Tính năng xem trực tuyến sẽ được cập nhật</p><a href="${material.url}" class="btn primary" style="display:inline-block;margin-top:16px;">Tải xuống</a></div>`;
            }

            document.getElementById('viewerModal').style.display = 'flex';
        }

        function loadPdf(url){
            if(typeof pdfjsLib === 'undefined'){
                document.getElementById('viewerBody').innerHTML = '<p>Không thể tải PDF. Vui lòng tải xuống.</p>';
                return;
            }
            pdfjsLib.getDocument(url).promise.then(pdf => {
                pdfDoc = pdf;
                document.getElementById('pageCount').innerText = pdf.numPages;
                currentPdfPage = 1;
                renderPdfPage(1);
            }).catch(err => {
                console.error('PDF Error:', err);
                document.getElementById('viewerBody').innerHTML = '<p>Lỗi khi tải PDF</p>';
            });
        }

        function renderPdfPage(pageNum){
            if(!pdfDoc) return;
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                    currentPdfPage = pageNum;
                    document.getElementById('pageNum').value = pageNum;
                });
            });
        }

        function nextPage(){
            if(pdfDoc && currentPdfPage < pdfDoc.numPages){
                renderPdfPage(currentPdfPage + 1);
            }
        }

        function previousPage(){
            if(currentPdfPage > 1){
                renderPdfPage(currentPdfPage - 1);
            }
        }

        function closeViewer(){
            document.getElementById('viewerModal').style.display = 'none';
            document.getElementById('viewerBody').innerHTML = '';
            pdfDoc = null;
        }

        // Flashcards – chapter-based
        function getFcCards(chapterNo){
            const key = String(chapterNo);
            return Array.isArray(fcChapters[key]) ? fcChapters[key] : [];
        }
        function saveFcChapters(){
            saveAndReturn(FC_CHAPTERS_KEY, fcChapters);
        }
        function isFlashcardAdmin(){
            const user = getLoggedInUser();
            return !!(user && user.role === 'Admin');
        }

        function renderFlashcards(chapterId){
            selectedFcChapter = Number(chapterId) || selectedFcChapter || 1;
            const content = document.getElementById('dynamic-content');
            const chapterButtons = Array.from({ length: 7 }, (_, i) => {
                const n = i + 1;
                return `<button class="chapter-chip ${n === selectedFcChapter ? 'active' : ''}" onclick="renderFlashcards(${n})">Chương ${n}</button>`;
            }).join('');
            const hint = isFlashcardAdmin()
                ? 'Admin có thể tạo và import flashcard bằng các nút bên phải.'
                : 'Đăng nhập tài khoản Admin để tạo / import flashcard.';
            content.innerHTML = `
                <h2 class="section-title">Flashcard</h2>
                <p class="small" style="margin-bottom:12px;">${hint}</p>
                <div class="exercise-layout">
                    <aside class="exercise-chapter-menu">${chapterButtons}</aside>
                    <section class="exercise-panel" id="fcChapterPanel"></section>
                </div>`;
            renderFcChapterPanel();
        }

        function renderFcChapterPanel(){
            const panel = document.getElementById('fcChapterPanel');
            if(!panel) return;
            fcChapterIndex = 0;
            const adminToolbar = isFlashcardAdmin() ? `
                <button class="btn primary" onclick="renderCreateFlashcardForm(${selectedFcChapter})"><i class='bx bx-plus'></i> Tạo flashcard</button>
                <button class="btn" onclick="downloadFcTemplate()"><i class='bx bx-download'></i> Tải template</button>
                <label class="btn" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;">
                    <i class='bx bx-upload'></i> Import CSV
                    <input type="file" accept=".csv" style="display:none;" onchange="handleFcImport(event)">
                </label>` : '';
            panel.innerHTML = `
                <div class="exercise-admin-toolbar">
                    <h3 style="margin:0;">Flashcard – Chương ${selectedFcChapter}</h3>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">${adminToolbar}</div>
                </div>
                <div id="fcCardArea"></div>`;
            renderFcCardArea();
        }

        function renderFcCardArea(){
            const area = document.getElementById('fcCardArea');
            if(!area) return;
            const cards = getFcCards(selectedFcChapter);
            if(cards.length === 0){
                area.innerHTML = '<p class="small" style="margin-top:12px;">Chưa có flashcard nào cho chương này.</p>';
                return;
            }
            if(fcChapterIndex >= cards.length) fcChapterIndex = 0;
            const card = cards[fcChapterIndex];
            area.innerHTML = `
                <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-top:16px;">
                    <div>
                        <div id="fcCard" class="flashcard" onclick="flipFcCard()">
                            <div class="side front" id="fcFront">${escapeHtml(card.front)}</div>
                            <div class="side back" id="fcBack">${escapeHtml(card.back)}</div>
                        </div>
                        <p class="small" style="text-align:center;margin-top:8px;">${fcChapterIndex + 1} / ${cards.length} &nbsp;·&nbsp; Click thẻ để lật</p>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;padding-top:8px;">
                        <div style="display:flex;gap:8px;">
                            <button class="btn" onclick="prevFcCard()">← Prev</button>
                            <button class="btn" onclick="nextFcCard()">Next →</button>
                        </div>
                        <button class="btn primary" onclick="shuffleFcCards()">🔀 Shuffle</button>
                    </div>
                </div>`;
        }

        function flipFcCard(){
            const el = document.getElementById('fcCard');
            if(el) el.classList.toggle('flipped');
        }
        function nextFcCard(){
            const cards = getFcCards(selectedFcChapter);
            if(!cards.length) return;
            fcChapterIndex = (fcChapterIndex + 1) % cards.length;
            renderFcCardArea();
        }
        function prevFcCard(){
            const cards = getFcCards(selectedFcChapter);
            if(!cards.length) return;
            fcChapterIndex = (fcChapterIndex - 1 + cards.length) % cards.length;
            renderFcCardArea();
        }
        function shuffleFcCards(){
            const key = String(selectedFcChapter);
            if(!Array.isArray(fcChapters[key]) || !fcChapters[key].length) return;
            const arr = fcChapters[key];
            for(let i = arr.length - 1; i > 0; i--){
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            saveFcChapters();
            fcChapterIndex = 0;
            renderFcCardArea();
        }

        function renderCreateFlashcardForm(chapterNo){
            if(!isFlashcardAdmin()){ alert('Chỉ Admin mới có thể tạo flashcard.'); return; }
            selectedFcChapter = Number(chapterNo) || 1;
            const panel = document.getElementById('fcChapterPanel');
            const chapterOptions = Array.from({ length: 7 }, (_, i) => {
                const c = i + 1;
                return `<option value="${c}" ${c === selectedFcChapter ? 'selected' : ''}>Chương ${c}</option>`;
            }).join('');
            panel.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
                    <h3 style="margin:0;">Tạo flashcard mới</h3>
                    <button class="btn" onclick="renderFcChapterPanel()"><i class='bx bx-arrow-back'></i> Quay lại</button>
                </div>
                <form class="exercise-form" onsubmit="handleCreateFlashcard(event)">
                    <label for="fcNewChapter">Chương</label>
                    <select id="fcNewChapter">${chapterOptions}</select>
                    <label for="fcNewFront">Mặt trước (từ khóa / câu hỏi)</label>
                    <input id="fcNewFront" type="text" placeholder="Nhập nội dung mặt trước" required>
                    <label for="fcNewBack">Mặt sau (đáp án / giải thích)</label>
                    <textarea id="fcNewBack" placeholder="Nhập nội dung mặt sau" required style="min-height:100px;resize:vertical;"></textarea>
                    <button class="btn primary" type="submit">Lưu flashcard</button>
                </form>`;
        }

        function handleCreateFlashcard(event){
            event.preventDefault();
            if(!isFlashcardAdmin()){ alert('Chỉ Admin mới có thể tạo flashcard.'); return; }
            const chapter = Number(document.getElementById('fcNewChapter').value);
            const front = document.getElementById('fcNewFront').value.trim();
            const back = document.getElementById('fcNewBack').value.trim();
            if(!front || !back){ alert('Vui lòng nhập đầy đủ mặt trước và mặt sau.'); return; }
            const key = String(chapter);
            if(!Array.isArray(fcChapters[key])) fcChapters[key] = [];
            fcChapters[key].push({ front, back });
            saveFcChapters();
            selectedFcChapter = chapter;
            renderFlashcards(chapter);
            alert('✅ Đã tạo flashcard thành công!');
        }

        function downloadFcTemplate(){
            const rows = ['chapter,front,back', '1,AI (Artificial Intelligence),Trí tuệ nhân tạo', '2,Test Oracle,Cơ chế xác định kết quả kiểm thử là đúng hay sai', '3,Overfitting,Hiện tượng mô hình học quá khớp với dữ liệu huấn luyện'];
            // \uFEFF = UTF-8 BOM, ensures correct encoding when opened in Excel/Sheets
            const csv = '\uFEFF' + rows.join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'flashcard_template.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        function parseCSVLine(line){
            const result = [];
            let current = '', inQuotes = false;
            for(let i = 0; i < line.length; i++){
                const ch = line[i];
                if(ch === '"'){
                    if(inQuotes && i + 1 < line.length && line[i+1] === '"'){ current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if(ch === ',' && !inQuotes){
                    result.push(current); current = '';
                } else { current += ch; }
            }
            result.push(current);
            return result.map(s => s.trim());
        }

        function handleFcImport(event){
            if(!isFlashcardAdmin()){ alert('Chỉ Admin mới có thể import flashcard.'); return; }
            const file = event.target.files[0];
            event.target.value = '';
            if(!file) return;
            if(!file.name.toLowerCase().endsWith('.csv')){
                alert('❌ Vui lòng chọn file CSV (.csv). Hãy tải template để biết định dạng đúng.');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e){
                const text = e.target.result;
                const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                if(lines.length < 2){ alert('File CSV không có dữ liệu.'); return; }

                const header = parseCSVLine(lines[0].toLowerCase());
                const frontIdx = header.indexOf('front');
                const backIdx = header.indexOf('back');
                const chapterIdx = header.indexOf('chapter');

                if(frontIdx === -1 || backIdx === -1){
                    alert('❌ File CSV thiếu cột bắt buộc "front" hoặc "back".\nVui lòng tải template và làm theo đúng định dạng.');
                    return;
                }

                let successCount = 0, failCount = 0;
                for(let i = 1; i < lines.length; i++){
                    const line = lines[i].trim();
                    if(!line) continue;
                    const cols = parseCSVLine(line);
                    const front = (cols[frontIdx] || '').trim();
                    const back = (cols[backIdx] || '').trim();
                    if(!front || !back){ failCount++; continue; }

                    let targetChapter = selectedFcChapter;
                    if(chapterIdx !== -1 && cols[chapterIdx]){
                        const p = Number(cols[chapterIdx]);
                        if(p >= 1 && p <= 7) targetChapter = p;
                    }
                    const key = String(targetChapter);
                    if(!Array.isArray(fcChapters[key])) fcChapters[key] = [];
                    fcChapters[key].push({ front, back });
                    successCount++;
                }
                saveFcChapters();
                renderFlashcards(selectedFcChapter);
                alert(`Import hoàn tất!\n✅ Thành công: ${successCount} flashcard\n❌ Bỏ qua (thiếu dữ liệu): ${failCount} dòng`);
            };
            reader.readAsText(file, 'UTF-8');
        }

        // Exercises
        function renderExercises(chapterId = selectedExerciseChapter){
            selectedExerciseChapter = Number(chapterId) || 1;
            const content = document.getElementById('dynamic-content');
            const chapterButtons = Array.from({ length: 7 }, (_, i) => {
                const chapterNo = i + 1;
                const activeClass = chapterNo === selectedExerciseChapter ? 'active' : '';
                return `<button class="chapter-chip ${activeClass}" onclick="renderExercises(${chapterNo})">Chương ${chapterNo}</button>`;
            }).join('');
            content.innerHTML = `
                <h2 class="section-title">Bài tập</h2>
                <p class="small" style="margin-bottom:12px;">Chọn chương để xem đề thi. Quyền tạo đề thi chỉ hiển thị cho Admin.</p>
                <div class="exercise-layout">
                    <aside class="exercise-chapter-menu">${chapterButtons}</aside>
                    <section class="exercise-panel" id="exerciseChapterPanel"></section>
                </div>`;
            renderExerciseChapterPanel();
        }

        function renderExerciseChapterPanel(){
            const panel = document.getElementById('exerciseChapterPanel');
            const examsByChapter = exerciseExams
                .filter(exam => Number(exam.chapter) === selectedExerciseChapter)
                .sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));

            const adminAction = isExerciseAdmin()
                ? `<button class="btn primary" onclick="renderCreateExamForm(${selectedExerciseChapter})"><i class='bx bx-plus'></i> Tạo đề thi</button>`
                : '<span class="small">Đăng nhập tài khoản Admin để tạo đề thi.</span>';

            panel.innerHTML = `
                <div class="exercise-admin-toolbar">
                    <h3 style="margin:0;">Danh sách đề - Chương ${selectedExerciseChapter}</h3>
                    ${adminAction}
                </div>
                <div id="exerciseExamList"></div>
                <div id="exercisePreviewArea"></div>`;

            const list = document.getElementById('exerciseExamList');
            if(examsByChapter.length === 0){
                list.innerHTML = '<p class="small">Chưa có đề thi nào cho chương này.</p>';
                return;
            }

            examsByChapter.forEach(exam => {
                const item = document.createElement('div');
                item.className = 'exercise-exam-item';
                item.innerHTML = `
                    <h4>${escapeHtml(exam.title)}</h4>
                    <p class="small" style="margin:0 0 10px 0;">Cập nhật: ${new Date(exam.updatedAt || exam.createdAt).toLocaleString('vi-VN')}</p>
                    <button class="btn" onclick="viewExerciseExam('${exam.id}')">Xem đề & Preview HTML</button>`;
                list.appendChild(item);
            });
        }

        function renderCreateExamForm(chapterNo){
            if(!isExerciseAdmin()){
                alert('Chỉ Admin mới có thể tạo đề thi.');
                return;
            }
            selectedExerciseChapter = Number(chapterNo) || 1;
            const panel = document.getElementById('exerciseChapterPanel');
            const chapterOptions = Array.from({ length: 7 }, (_, i) => {
                const chapter = i + 1;
                return `<option value="${chapter}" ${chapter === selectedExerciseChapter ? 'selected' : ''}>Chương ${chapter}</option>`;
            }).join('');
            panel.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
                    <h3 style="margin:0;">Tạo đề thi mới</h3>
                    <button class="btn" onclick="renderExerciseChapterPanel()"><i class='bx bx-arrow-back'></i> Quay lại</button>
                </div>
                <form class="exercise-form" onsubmit="handleCreateExerciseExam(event)">
                    <label for="examTitle">Tên đề thi</label>
                    <input id="examTitle" type="text" placeholder="Ví dụ: Đề luyện tập chương 3" required>
                    <label for="examChapter">Chương</label>
                    <select id="examChapter">${chapterOptions}</select>
                    <label for="examHtmlContent">Nội dung HTML đề thi</label>
                    <textarea id="examHtmlContent" placeholder="<h2>Đề thi</h2><p>Nội dung câu hỏi...</p>" required></textarea>
                    <button class="btn primary" type="submit">Lưu đề thi</button>
                </form>`;
        }

        function handleCreateExerciseExam(event){
            event.preventDefault();
            if(!isExerciseAdmin()){
                alert('Chỉ Admin mới có thể tạo đề thi.');
                return;
            }

            const title = document.getElementById('examTitle').value.trim();
            const chapter = Number(document.getElementById('examChapter').value);
            const htmlContent = document.getElementById('examHtmlContent').value.trim();
            if(!title || !htmlContent){
                alert('Vui lòng nhập đầy đủ tên đề thi và nội dung HTML.');
                return;
            }

            const now = new Date().toISOString();
            const newExam = {
                id: generateExamId(),
                chapter,
                title,
                htmlContent,
                createdAt: now,
                updatedAt: now
            };

            exerciseExams.unshift(newExam);
            saveExerciseExams();
            selectedExerciseChapter = chapter;
            renderExercises(chapter);
            viewExerciseExam(newExam.id);
        }

        function viewExerciseExam(examId){
            const exam = exerciseExams.find(item => item.id === examId);
            if(!exam) return;

            const previewArea = document.getElementById('exercisePreviewArea');
            previewArea.innerHTML = `
                <div class="exercise-preview-wrap">
                    <div class="exercise-preview-head">${escapeHtml(exam.title)} - Chương ${exam.chapter}</div>
                    <iframe id="exercisePreviewFrame" class="exercise-preview-frame" sandbox></iframe>
                </div>`;

            document.getElementById('exercisePreviewFrame').srcdoc = sanitizeExamHtml(exam.htmlContent || '<p>Nội dung đề trống.</p>');
        }

        // Mock exam (Thi thử)
        let mockSession = null;
        function renderMockExam(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Thi thử</h2>
                <div style="margin-bottom:10px;">
                    <label class="small">Số câu: </label>
                    <select id="mockCount"><option>3</option><option>5</option><option>10</option></select>
                    <button class="btn primary" onclick="startMock()">Bắt đầu</button>
                </div>
                <div id="mockArea"></div>`;
        }
        function startMock(){
            const n = Number(document.getElementById('mockCount').value);
            if(questions.length===0){
                alert('Chưa có câu hỏi để thi.');
                return;
            }
            const pool = [...questions].sort(()=>Math.random()-0.5).slice(0,n);
            mockSession = { pool, answers: {} };
            renderMockQuestions();
        }
        function renderMockQuestions(){
            const area = document.getElementById('mockArea');
            area.innerHTML = '';
            mockSession.pool.forEach((q, idx)=>{
                const qdiv = document.createElement('div');
                qdiv.className = 'question';
                let optionsHtml = '';
                q.choices.forEach((c,i)=>{
                    optionsHtml += `<div class="option" data-qi="${idx}" data-idx="${i}" onclick="mockChoose(this)">${c}</div>`;
                });
                qdiv.innerHTML = `<strong>${idx+1}. ${q.question}</strong><div class="options">${optionsHtml}</div>`;
                area.appendChild(qdiv);
            });
            const btn = document.createElement('button');
            btn.className = 'btn primary';
            btn.innerText = 'Nộp bài';
            btn.onclick = finishMock;
            area.appendChild(btn);
        }
        function mockChoose(el){
            const qi = Number(el.getAttribute('data-qi'));
            const ix = Number(el.getAttribute('data-idx'));
            const parent = el.parentElement;
            Array.from(parent.children).forEach(o=>o.style.background='');
            el.style.background='rgba(34,179,164,0.2)';
            mockSession.answers[qi] = ix;
        }
        function finishMock(){
            const total = mockSession.pool.length;
            let ok=0;
            mockSession.pool.forEach((q,i)=>{
                if(mockSession.answers[i]===q.answer) ok++;
            });
            const score = Math.round(100 * ok / total);
            const histItem = { date: new Date().toLocaleString('vi-VN'), score };
            historyItems.push(histItem);
            saveAndReturn(STORAGE_KEYS.history, historyItems);
            alert(`Kết quả: ${ok}/${total} (${score}%)`);
            renderMockExam();
        }

        // History
        function renderHistory(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `<h2 class="section-title">Lịch sử làm bài</h2><div id="historyList"></div>`;
            const listDiv = document.getElementById('historyList');
            if(historyItems.length===0){
                listDiv.innerHTML='<div class="small">Chưa có lịch sử.</div>';
                return;
            }
            historyItems.slice().reverse().forEach(h=>{
                const item = document.createElement('div');
                item.className = 'question';
                item.innerHTML = `<strong>${h.date}</strong><br/><span class="small">Điểm: ${h.score}%</span>`;
                listDiv.appendChild(item);
            });
        }

        // Progress (Chart.js)
        let progressChart = null;
        function renderProgress(){
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `
                <h2 class="section-title">Tiến độ học tập</h2>
                <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
                    <div style="width:420px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">
                        <h4>Tiến độ cá nhân</h4>
                        <canvas id="progressCanvas" width="400" height="240"></canvas>
                        <div style="margin-top:10px;" id="avgScoreDisplay"></div>
                    </div>
                    <div style="flex:1;min-width:320px;background:var(--bg-card);padding:12px;border-radius:10px;border:1px solid var(--border-color);">
                        <h4>Chi tiết</h4>
                        <div id="progressList"><div class="small">Không có dữ liệu khóa cụ thể.</div></div>
                    </div>
                </div>`;
            const ctx = document.getElementById('progressCanvas').getContext('2d');
            const labels = ['Tổng tiến độ'];
            const data = [0];
            if(historyItems.length > 0){
                const avgScore = Math.round(historyItems.reduce((s,h)=>s+h.score,0) / historyItems.length);
                data[0] = avgScore;
                document.getElementById('avgScoreDisplay').innerHTML = `<strong>Điểm trung bình: ${avgScore}%</strong>`;
            }
            if(progressChart) progressChart.destroy();
            progressChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Điểm (%)', data, backgroundColor: '#22b3a4' }] },
                options: { responsive:true, plugins: { legend: { display:false } }, scales: { y: { max:100 } } }
            });
        }

        function renderAuthHeader(){
            const user = getLoggedInUser();
            const el = document.getElementById('authHeader');
            if(!el) return;
            if(user){
                el.innerHTML = `<span style="color:var(--text-gray);">Xin chào, <strong>${escapeHtml(user.name)}</strong> (${escapeHtml(user.role)})</span>
                    <button class="btn" onclick="handleDashboardLogout()" style="padding:6px 12px;font-size:.85rem;">Đăng xuất</button>`;
            } else {
                el.innerHTML = `<span style="color:var(--text-gray);">Bạn chưa đăng nhập</span>
                    <a href="index.html" class="btn primary" style="padding:6px 12px;font-size:.85rem;text-decoration:none;">Đăng nhập</a>`;
            }
        }
        function handleDashboardLogout(){
            localStorage.removeItem('loggedInUser');
            window.location.href = 'index.html';
        }

        function init(){
            renderAuthHeader();
            changeContent('theory');
        }
        init();

        window.changeContent = changeContent;
        window.closeViewer = closeViewer;
    </script>
