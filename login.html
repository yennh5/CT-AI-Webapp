<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CT-AI v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2 class="logo-title" style="color: #2c3e50;">ĐĂNG NHẬP CT-AI</h2>
        <div class="login-form">
            <input type="text" id="username" placeholder="Email hoặc Username" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <p id="login-error" class="error-msg"></p>
            <button onclick="handleLogin()" class="login-btn">Đăng nhập</button>
        </div>
        <p class="note">Lưu ý: Học viên vui lòng liên hệ Admin để được cấp tài khoản.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
